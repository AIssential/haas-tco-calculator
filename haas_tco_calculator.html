<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>TCO Calculator — ElephantONE</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="pragma" content="no-cache" />
        <style>
            *{box-sizing:border-box;margin:0;padding:0}
            body.staticrypt-body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif;background:#F1F4F8;height:100%;display:flex;flex-direction:column}
            .staticrypt-html{height:100%}

            /* Top banner */
            .login-banner{background:#fff;border-bottom:4px solid #30C96F;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
            .login-banner-title{font-size:.95rem;font-weight:800;color:#1A202C}
            .login-banner-sub{font-size:.68rem;color:#64748B;margin-top:2px}

            /* Language switcher */
            .lang-bar{display:flex;gap:6px}
            .lang-btn{padding:5px 14px;font-size:.72rem;font-weight:700;border:2px solid #DDE3EA;border-radius:5px;background:#F1F4F8;color:#64748B;cursor:pointer;transition:.15s}
            .lang-btn:hover{background:#e2e8f0;color:#1A202C}
            .lang-btn.active{background:#30C96F;border-color:#22a85a;color:#fff}

            /* Card */
            .staticrypt-content{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 16px}
            .hidden{display:none!important}
            .staticrypt-spinner-container{flex:1;display:flex;align-items:center;justify-content:center}
            .staticrypt-spinner{display:inline-block;width:2rem;height:2rem;border:.25em solid #30C96F;border-right-color:transparent;border-radius:50%;animation:spin .75s linear infinite}
            @keyframes spin{100%{transform:rotate(360deg)}}

            .login-card{background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.10);padding:40px 44px;width:100%;max-width:380px;text-align:center}
            .login-icon{font-size:2.4rem;margin-bottom:12px}
            .login-title{font-size:1.1rem;font-weight:800;color:#1A202C;margin-bottom:6px}
            .login-sub{font-size:.75rem;color:#64748B;margin-bottom:24px;line-height:1.5}

            .staticrypt-password-container{position:relative;background:#F1F4F8;border:2px solid #DDE3EA;border-radius:6px;overflow:hidden;margin-bottom:14px}
            .staticrypt-password-container:focus-within{border-color:#30C96F}
            input[type="password"],input[type="text"]{background:transparent;border:0;font-size:14px;outline:0;padding:14px 40px 14px 14px;width:100%;color:#1A202C}
            .staticrypt-toggle-password-visibility{cursor:pointer;height:18px;opacity:.5;padding:0;position:absolute;right:12px;top:50%;transform:translateY(-50%);width:18px}
            .staticrypt-toggle-password-visibility:hover{opacity:.8}

            label.staticrypt-remember{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px;font-size:.75rem;color:#64748B;cursor:pointer}
            .staticrypt-remember input[type="checkbox"]{accent-color:#30C96F;width:15px;height:15px}

            .staticrypt-decrypt-button{background:#30C96F;border:0;border-radius:6px;color:#fff;cursor:pointer;font-size:.85rem;font-weight:700;padding:13px;width:100%;text-transform:uppercase;letter-spacing:.05em;transition:.15s}
            .staticrypt-decrypt-button:hover{filter:brightness(92%)}

            .login-version{font-size:.62rem;color:#94a3b8;margin-top:18px}
        </style>
    </head>
    <body class="staticrypt-body">

        <!-- Top banner with language switcher -->
        <div class="login-banner">
            <div>
                <div class="login-banner-title" id="banner-title">ElephantONE vs Standard HP vs Gas Boiler</div>
                <div class="login-banner-sub" id="banner-sub">TCO / LCOH Calculator · Protected Access</div>
            </div>
            <div class="lang-bar">
                <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
                <button class="lang-btn" id="btn-zh" onclick="setLang('zh')">繁中</button>
            </div>
        </div>

        <!-- Loading spinner -->
        <div id="staticrypt_loading" class="staticrypt-spinner-container">
            <div class="staticrypt-spinner"></div>
        </div>

        <div id="staticrypt_content" class="staticrypt-content hidden">
            <div class="login-card">
                <div class="login-icon">🔒</div>
