<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>TCO Calculator — ElephantONE</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="pragma" content="no-cache" />
        <style>
            *{box-sizing:border-box;margin:0;padding:0}
            body.staticrypt-body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif;background:#F1F4F8;height:100%;display:flex;flex-direction:column}
            .staticrypt-html{height:100%}

            /* Top banner */
            .login-banner{background:#fff;border-bottom:4px solid #30C96F;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
            .login-banner-title{font-size:.95rem;font-weight:800;color:#1A202C}
            .login-banner-sub{font-size:.68rem;color:#64748B;margin-top:2px}

            /* Language switcher */
            .lang-bar{display:flex;gap:6px}
            .lang-btn{padding:5px 14px;font-size:.72rem;font-weight:700;border:2px solid #DDE3EA;border-radius:5px;background:#F1F4F8;color:#64748B;cursor:pointer;transition:.15s}
            .lang-btn:hover{background:#e2e8f0;color:#1A202C}
            .lang-btn.active{background:#30C96F;border-color:#22a85a;color:#fff}

            /* Card */
            .staticrypt-content{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 16px}
            .hidden{display:none!important}
            .staticrypt-spinner-container{flex:1;display:flex;align-items:center;justify-content:center}
            .staticrypt-spinner{display:inline-block;width:2rem;height:2rem;border:.25em solid #30C96F;border-right-color:transparent;border-radius:50%;animation:spin .75s linear infinite}
            @keyframes spin{100%{transform:rotate(360deg)}}

            .login-card{background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.10);padding:40px 44px;width:100%;max-width:380px;text-align:center}
            .login-icon{font-size:2.4rem;margin-bottom:12px}
            .login-title{font-size:1.1rem;font-weight:800;color:#1A202C;margin-bottom:6px}
            .login-sub{font-size:.75rem;color:#64748B;margin-bottom:24px;line-height:1.5}

            .staticrypt-password-container{position:relative;background:#F1F4F8;border:2px solid #DDE3EA;border-radius:6px;overflow:hidden;margin-bottom:14px}
            .staticrypt-password-container:focus-within{border-color:#30C96F}
            input[type="password"],input[type="text"]{background:transparent;border:0;font-size:14px;outline:0;padding:14px 40px 14px 14px;width:100%;color:#1A202C}
            .staticrypt-toggle-password-visibility{cursor:pointer;height:18px;opacity:.5;padding:0;position:absolute;right:12px;top:50%;transform:translateY(-50%);width:18px}
            .staticrypt-toggle-password-visibility:hover{opacity:.8}

            label.staticrypt-remember{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px;font-size:.75rem;color:#64748B;cursor:pointer}
            .staticrypt-remember input[type="checkbox"]{accent-color:#30C96F;width:15px;height:15px}

            .staticrypt-decrypt-button{background:#30C96F;border:0;border-radius:6px;color:#fff;cursor:pointer;font-size:.85rem;font-weight:700;padding:13px;width:100%;text-transform:uppercase;letter-spacing:.05em;transition:.15s}
            .staticrypt-decrypt-button:hover{filter:brightness(92%)}

            .login-version{font-size:.62rem;color:#94a3b8;margin-top:18px}
        </style>
    </head>
    <body class="staticrypt-body">

        <!-- Top banner with language switcher -->
        <div class="login-banner">
            <div>
                <div class="login-banner-title" id="banner-title">ElephantONE vs Standard HP vs Gas Boiler</div>
                <div class="login-banner-sub" id="banner-sub">TCO / LCOH Calculator · Protected Access</div>
            </div>
            <div class="lang-bar">
                <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
                <button class="lang-btn" id="btn-zh" onclick="setLang('zh')">繁中</button>
            </div>
        </div>

        <!-- Loading spinner -->
        <div id="staticrypt_loading" class="staticrypt-spinner-container">
            <div class="staticrypt-spinner"></div>
        </div>

        <!-- Login form -->
        <div id="staticrypt_content" class="staticrypt-content hidden">
            <div class="login-card">
                <div class="login-icon">🔒</div>
                <div class="login-title" id="login-title">Protected Content</div>
                <div class="login-sub" id="login-sub">Enter the password to access the calculator.</div>

                <form id="staticrypt-form" action="#" method="post">
                    <div class="staticrypt-password-container">
                        <input
                            id="staticrypt-password"
                            type="password"
                            name="password"
                            placeholder="/*[|template_placeholder|]*/0"
                            autofocus
                        />
                        <img
                            class="staticrypt-toggle-password-visibility"
                            alt="/*[|template_toggle_show|]*/0"
                            title="/*[|template_toggle_show|]*/0"
                            src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NDAgNTEyIj48cGF0aCBkPSJNMzguOCA1LjFDMjguNC0zLjEgMTMuMy0xLjIgNS4xIDkuMlMtMS4yIDM0LjcgOS4yIDQyLjlsNTkyIDQ2NGMxMC40IDguMiAyNS41IDYuMyAzMy43LTQuMXM2LjMtMjUuNS00LjEtMzMuN0w1MjUuNiAzODYuN2MzOS42LTQwLjYgNjYuNC04Ni4xIDc5LjktMTE4LjRjMy4zLTcuOSAzLjMtMTYuNyAwLTI0LjZjLTE0LjktMzUuNy00Ni4yLTg3LjctOTMtMTMxLjFDNDY1LjUgNjguOCA0MDAuOCAzMiAzMjAgMzJjLTY4LjIgMC0xMjUgMjYuMy0xNjkuMyA2MC44TDM4LjggNS4xek0yMjMuMSAxNDkuNUMyNDguNiAxMjYuMiAyODIuNyAxMTIgMzIwIDExMmM3OS41IDAgMTQ0IDY0LjUgMTQ0IDE0NGMwIDI0LjktNi4zIDQ4LjMtMTcuNCA2OC43TDQwOCAyOTQuNWM4LjQtMTkuMyAxMC42LTQxLjQgNC44LTYzLjNjLTExLjEtNDEuNS00Ny44LTY5LjQtODguNi03MS4xYy01LjgtLjItOS4yIDYuMS03LjQgMTEuN2MyLjEgNi40IDMuMyAxMy4yIDMuMyAyMC4zYzAgMTAuMi0yLjQgMTkuOC02LjYgMjguM2wtOTAuMy03MC44ek0zNzMgMzg5LjljLTE2LjQgNi41LTM0LjMgMTAuMS01MyAxMC4xYy03OS41IDAtMTQ0LTY0LjUtMTQ0LTE0NGMwLTYuOS41LTEzLjYgMS40LTIwLjJMODMuMSAxNjEuNUM2MC4zIDE5MS4yIDQ0IDIyMC44IDM0LjUgMjQzLjdjLTMuMyA3LjktMy4zIDE2LjcgMCAyNC42YzE0LjkgMzUuNyA0Ni4yIDg3LjcgOTMgMTMxLjFDMTc0LjUgNDQzLjIgMjM5LjIgNDgwIDMyMCA0ODBjNDcuOCAwIDg5LjktMTIuOSAxMjYuMi0zMi41TDM3MyAzODkuOXoiLz48L3N2Zz4="
                        />

                    <label id="staticrypt-remember-label" class="staticrypt-remember hidden">
                        <input id="staticrypt-remember" type="checkbox" name="remember" />

                    </label>

                    <input type="submit" class="staticrypt-decrypt-button" id="decrypt-btn" value="/*[|template_button|]*/0" />
                </form>

                <div class="login-version" id="login-version">V0.7 — Bilingual EN/繁中</div>
            </div>
        </div>

        <script>
            // Staticrypt engine variables
            const staticryptInitiator = /*[|js_staticrypt|]*/ 0;
            const templateError = "/*[|template_error|]*/0",
                templateToggleAltShow = "/*[|template_toggle_show|]*/0",
                templateToggleAltHide = "/*[|template_toggle_hide|]*/0",
                isRememberEnabled = /*[|is_remember_enabled|]*/ 0,
                staticryptConfig = /*[|staticrypt_config|]*/ 0;

            const templateConfig = {
                rememberExpirationKey: "staticrypt_expiration",
                rememberPassphraseKey: "staticrypt_passphrase",
                replaceHtmlCallback: function (plainHTML) {
                    // Use a full-viewport srcdoc iframe so all scripts, events
                    // and styles load naturally (avoids document.write quirks)
                    document.documentElement.innerHTML =
                        '<head><style>html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden}iframe{display:block;width:100%;height:100%;border:none}</style></head>' +
                        '<body><iframe id="staticrypt-frame"></iframe></body>';
                    document.getElementById('staticrypt-frame').srcdoc = plainHTML;
                },
                clearLocalStorageCallback: null,
            };

            const staticrypt = staticryptInitiator.init(staticryptConfig, templateConfig);

            // ── Language logic ────────────────────────────────────────────
            const STRINGS = {
                en: {
                    bannerTitle: 'ElephantONE vs Standard HP vs Gas Boiler',
                    bannerSub:   'TCO / LCOH Calculator · Protected Access',
                    loginTitle:  'Protected Content',
                    loginSub:    'Enter the password to access the calculator.',
                    btnDecrypt:  'UNLOCK CALCULATOR',
                },
                zh: {
                    bannerTitle: 'ElephantONE vs 標準熱泵 vs 燃氣鍋爐',
                    bannerSub:   '總擁有成本 / 熱能平準化成本計算機 · 受保護存取',
                    loginTitle:  '受保護的內容',
                    loginSub:    '請輸入密碼以存取計算機。',
                    btnDecrypt:  '解鎖計算機',
                }
            };

            const defaultLang = 'en';

            function getLang() {
                return localStorage.getItem('haas_lang') || defaultLang;
            }

            function setLang(lang) {
                localStorage.setItem('haas_lang', lang);
                const currentIsZh = window.location.pathname.includes('v06');
                // Stay on the current page; just switch labels locally
                applyLang(lang);
            }

            function applyLang(lang) {
                const s = STRINGS[lang] || STRINGS.en;
                document.getElementById('banner-title').textContent = s.bannerTitle;
                document.getElementById('banner-sub').textContent   = s.bannerSub;
                document.getElementById('login-title').textContent  = s.loginTitle;
                document.getElementById('login-sub').textContent    = s.loginSub;
                document.getElementById('decrypt-btn').value        = s.btnDecrypt;
                document.getElementById('btn-en').classList.toggle('active', lang === 'en');
                document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
            }

            // Apply stored language on load
            applyLang(getLang());

            // ── Staticrypt boot ───────────────────────────────────────────
            window.onload = async function () {
                const { isSuccessful } = await staticrypt.handleDecryptOnLoad();
                if (!isSuccessful) {
                    document.getElementById("staticrypt_loading").classList.add("hidden");
                    document.getElementById("staticrypt_content").classList.remove("hidden");
                    document.getElementById("staticrypt-password").focus();
                    if (isRememberEnabled) {
                        document.getElementById("staticrypt-remember-label").classList.remove("hidden");
                    }
                }
            };

            // Toggle password visibility
            const toggleIcon = document.querySelector(".staticrypt-toggle-password-visibility");
            const imgSrcEyeClosed = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NDAgNTEyIj48cGF0aCBkPSJNMzguOCA1LjFDMjguNC0zLjEgMTMuMy0xLjIgNS4xIDkuMlMtMS4yIDM0LjcgOS4yIDQyLjlsNTkyIDQ2NGMxMC40IDguMiAyNS41IDYuMyAzMy43LTQuMXM2LjMtMjUuNS00LjEtMzMuN0w1MjUuNiAzODYuN2MzOS42LTQwLjYgNjYuNC04Ni4xIDc5LjktMTE4LjRjMy4zLTcuOSAzLjMtMTYuNyAwLTI0LjZjLTE0LjktMzUuNy00Ni4yLTg3LjctOTMtMTMxLjFDNDY1LjUgNjguOCA0MDAuOCAzMiAzMjAgMzJjLTY4LjIgMC0xMjUgMjYuMy0xNjkuMyA2MC44TDM4LjggNS4xek0yMjMuMSAxNDkuNUMyNDguNiAxMjYuMiAyODIuNyAxMTIgMzIwIDExMmM3OS41IDAgMTQ0IDY0LjUgMTQ0IDE0NGMwIDI0LjktNi4zIDQ4LjMtMTcuNCA2OC43TDQwOCAyOTQuNWM4LjQtMTkuMyAxMC42LTQxLjQgNC44LTYzLjNjLTExLjEtNDEuNS00Ny44LTY5LjQtODguNi03MS4xYy01LjgtLjItOS4yIDYuMS03LjQgMTEuN2MyLjEgNi40IDMuMyAxMy4yIDMuMyAyMC4zYzAgMTAuMi0yLjQgMTkuOC02LjYgMjguM2wtOTAuMy03MC44ek0zNzMgMzg5LjljLTE2LjQgNi41LTM0LjMgMTAuMS01MyAxMC4xYy03OS41IDAtMTQ0LTY0LjUtMTQ0LTE0NGMwLTYuOS41LTEzLjYgMS40LTIwLjJMODMuMSAxNjEuNUM2MC4zIDE5MS4yIDQ0IDIyMC44IDM0LjUgMjQzLjdjLTMuMyA3LjktMy4zIDE2LjcgMCAyNC42YzE0LjkgMzUuNyA0Ni4yIDg3LjcgOTMgMTMxLjFDMTc0LjUgNDQzLjIgMjM5LjIgNDgwIDMyMCA0ODBjNDcuOCAwIDg5LjktMTIuOSAxMjYuMi0zMi41TDM3MyAzODkuOXoiLz48L3N2Zz4=";
            const imgSrcEyeOpened  = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1NzYgNTEyIj48cGF0aCBkPSJNMjg4IDMyYy04MC44IDAtMTQ1LjUgMzYuOC0xOTIuNiA4MC42QzQ4LjYgMTU2IDE3LjMgMjA4IDIuNSAyNDMuN2MtMy4zIDcuOS0zLjMgMTYuNyAwIDI0LjZDMTcuMyAzMDQgNDguNiAzNTYgOTUuNCAzOTkuNEMxNDIuNSA0NDMuMiAyMDcuMiA0ODAgMjg4IDQ4MHMxNDUuNS0zNi44IDE5Mi42LTgwLjZjNDYuOC00My41IDc4LjEtOTUuNCA5My0xMzEuMWMzLjMtNy45IDMuMy0xNi43IDAtMjQuNmMtMTQuOS0zNS43LTQ2LjItODcuNy05My0xMzEuMUM0MzMuNSA2OC44IDM2OC44IDMyIDI4OCAzMnpNMTQ0IDI1NmExNDQgMTQ0IDAgMSAxIDI4OCAwIDE0NCAxNDQgMCAxIDEgLTI4OCAwem0xNDQtNjRjMCAzNS4zLTI4LjcgNjQtNjQgNjRjLTcuMSAwLTEzLjktMS4yLTIwLjMtMy4zYy01LjUtMS44LTExLjkgMS42LTExLjcgNy40Yy4zIDYuOSAxLjMgMTMuOCAzLjIgMjAuN2MxMy43IDUxLjIgNjYuNCA4MS42IDExNy42IDY3LjlzODEuNi02Ni40IDY3LjktMTE3LjZjLTExLjEtNDEuNS00Ny44LTY5LjQtODguNi03MS4xYy01LjgtLjItOS4yIDYuMS03LjQgMTEuN2MyLjEgNi40IDMuMyAxMy4yIDMuMyAyMC4zeiIvPjwvc3ZnPg==";
            toggleIcon.addEventListener("click", function () {
                const pw = document.getElementById("staticrypt-password");
                if (pw.type === "password") {
                    pw.type = "text"; toggleIcon.src = imgSrcEyeOpened;
                    toggleIcon.alt = templateToggleAltHide; toggleIcon.title = templateToggleAltHide;
                } else {
                    pw.type = "password"; toggleIcon.src = imgSrcEyeClosed;
                    toggleIcon.alt = templateToggleAltShow; toggleIcon.title = templateToggleAltShow;
                }
            });

            document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {
                e.preventDefault();
                const password = document.getElementById("staticrypt-password").value,
                      isRememberChecked = document.getElementById("staticrypt-remember").checked;
                const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, isRememberChecked);
                if (!isSuccessful) { alert(templateError); }
            });
        </script>
    </body>
</html>
